<!DOCTYPE html>
<html>

<head>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <meta charset="UTF-8">
  <title>LINE 打卡系統</title>
  <!-- 引入 LIFF SDK -->
  <script src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
  <style>
    body {
      font-family: Arial, sans-serif;
      margin: 0;
      padding: 24px;
      background: #f5f7fb;
      color: #222;
    }

    .card {
      max-width: 420px;
      margin: 0 auto;
      background: #fff;
      border-radius: 16px;
      padding: 24px;
      box-shadow: 0 8px 24px rgba(0, 0, 0, 0.08);
    }

    h1 {
      margin-top: 0;
      text-align: center;
      font-size: 24px;
      margin-bottom: 8px;
    }

    .version {
      text-align: center;
      color: #d93025;
      font-size: 12px;
      margin-bottom: 12px;
      font-weight: bold;
    }

    .user-box {
      background: #f0f4ff;
      border-radius: 12px;
      padding: 12px;
      margin-bottom: 16px;
      font-size: 14px;
      line-height: 1.6;
      word-break: break-all;
    }

    .row {
      margin-bottom: 12px;
    }

    textarea {
      width: 100%;
      min-height: 80px;
      box-sizing: border-box;
      border: 1px solid #ccc;
      border-radius: 10px;
      padding: 10px;
      font-size: 14px;
    }

    button {
      width: 100%;
      border: none;
      border-radius: 12px;
      padding: 14px;
      font-size: 16px;
      font-weight: bold;
      cursor: pointer;
      margin-top: 10px;
    }

    .btn-in {
      background: #06c755;
      color: #fff;
    }

    .btn-out {
      background: #1f6feb;
      color: #fff;
    }

    .status {
      margin-top: 16px;
      font-size: 14px;
      text-align: center;
      white-space: pre-line;
    }

    .muted {
      color: #666;
      font-size: 13px;
      text-align: center;
      margin-top: 12px;
      white-space: pre-line;
    }

    .loading {
      opacity: 0.6;
      pointer-events: none;
    }

    /* 新增拍照區域樣式 */
    .photo-area {
      margin-bottom: 20px;
      text-align: center;
    }

    #photoPreview {
      width: 100%;
      max-height: 200px;
      object-fit: contain;
      border-radius: 8px;
      margin-top: 10px;
      display: none;
      border: 1px solid #eee;
    }

    .file-btn {
      background: #f8f9fa;
      border: 1px solid #ddd;
      color: #333;
      padding: 10px;
      font-size: 14px;
      cursor: pointer;
      display: block;
      width: 100%;
      box-sizing: border-box;
      border-radius: 10px;
    }
  </style>
</head>

<body>
  <div class="card" id="app">
    <h1>LINE 打卡系統test..</h1>
    <div class="version">VERSION 2026-03-25-04 (獨立前端)</div>
    <div class="user-box" id="userInfo">初始化中...</div>
    <div class="row">
      <label for="note">備註</label>
      <textarea id="note" placeholder="例如：外出拜訪客戶"></textarea>
    </div>
    <div class="photo-area">
      <label class="file-btn">
        📷 拍攝照片 / 選擇圖片
        <input type="file" id="photoInput" accept="image/*" capture="camera" style="display:none;"
          onchange="previewImage(this)">
      </label>
      <img id="photoPreview" src="" alt="預覽圖">
    </div>
    <button class="btn-in" onclick="submitPunch('clock_in')">上班打卡</button>
    <button class="btn-out" onclick="submitPunch('clock_out')">下班打卡</button>
    <div class="status" id="status"></div>
    <div class="muted" id="envHint"></div>
  </div>

  <script>
    // ==========================================
    // 【設定區】請務必填寫以下兩個參數
    // ==========================================
    const LIFF_ID = '2009659874-L5B3KDJv';

    // 請填入 GAS 發布出來的【網頁應用程式網址 (URL)】
    // 結尾必須是 /exec
    const GAS_API_URL = 'https://script.google.com/macros/s/AKfycbzKvkRrT6rEUHYrGG2pCLSl7ecCE0WMJfyRzzcvehfyEd5uL04HOkZwbi6NL1muPN8AaA/exec';
    // ==========================================

    let profile = null;
    let currentPosition = { latitude: '', longitude: '' };

    async function initApp() {
      const userInfoEl = document.getElementById('userInfo');
      try {
        userInfoEl.innerHTML = '開始初始化...';

        await liff.init({ liffId: LIFF_ID });
        showEnvironmentHint();

        if (!liff.isLoggedIn()) {
          setStatus('尚未登入，請點擊按鈕登入 LINE...');
          document.getElementById('app').innerHTML = `
              <h1>LINE 打卡系統</h1>
              <div class="version">VERSION 2026-03-25-04</div>
              <div class="user-box" style="text-align:center; color:#d93025; font-weight:bold; margin-bottom: 24px;">
                尚未登入，請先進行 LINE 授權
              </div>
              <button onclick="liff.login();" class="btn-in">登入 LINE 打卡系統</button>
            `;
          return;
        }

        setStatus('正在取得 LINE 使用者資料...');
        let userId = '', displayName = '', pictureUrl = '', statusMessage = '';

        try {
          const p = await liff.getProfile();
          userId = p.userId;
          displayName = p.displayName;
          pictureUrl = p.pictureUrl || '';
          statusMessage = p.statusMessage || '';
        } catch (profileErr) {
          const idToken = liff.getDecodedIDToken();
          if (idToken) {
            userId = idToken.sub;
            displayName = idToken.name;
            pictureUrl = idToken.picture || '';
          }
        }

        if (!userId || !displayName) {
          throw new Error('LINE 使用者資料取得失敗');
        }

        profile = { userId, displayName, pictureUrl, statusMessage };
        renderUser(profile);

        try {
          currentPosition = await getLocation();
        } catch (gpsErr) {
          console.warn('GPS 取得失敗:', gpsErr);
        }
        setStatus('請選擇打卡類型');
      } catch (err) {
        console.error(err);
        userInfoEl.innerHTML = '<strong>初始化失敗</strong><br>' + err.message;
        setStatus('初始化失敗：' + err.message);
      }
    }

    function renderUser(profile) {
      document.getElementById('userInfo').innerHTML = `
          <div><strong>姓名：</strong>${profile.displayName}</div>
          <div><strong>User ID：</strong>${profile.userId}</div>
        `;
    }

    function showEnvironmentHint() {
      document.getElementById('envHint').textContent =
        (liff.isInClient() ? '✅ 目前在 LINE 內開啟' : '🌐 目前在外部瀏覽器開啟');
    }

    function getLocation() {
      return new Promise((resolve, reject) => {
        if (!navigator.geolocation) { reject(new Error('不支援定位')); return; }
        navigator.geolocation.getCurrentPosition(
          (pos) => resolve({ latitude: pos.coords.latitude, longitude: pos.coords.longitude }),
          (err) => reject(err),
          { enableHighAccuracy: true, timeout: 10000, maximumAge: 0 }
        );
      });
    }

    function previewImage(input) {
      const preview = document.getElementById('photoPreview');
      if (input.files && input.files[0]) {
        const reader = new FileReader();
        reader.onload = function (e) {
          preview.src = e.target.result;
          preview.style.display = 'block';
        };
        reader.readAsDataURL(input.files[0]);
      } else {
        preview.src = "";
        preview.style.display = 'none';
      }
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = () => resolve(reader.result);
        reader.onerror = error => reject(error);
      });
    }

    /**
     * 壓縮圖片：將圖片縮小並轉換為較小的 Base64
     */
    function compressImage(file, maxWidth = 1000) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.readAsDataURL(file);
        reader.onload = (event) => {
          const img = new Image();
          img.src = event.target.result;
          img.onload = () => {
            const canvas = document.createElement('canvas');
            let width = img.width;
            let height = img.height;

            if (width > maxWidth) {
              height = Math.round((height * maxWidth) / width);
              width = maxWidth;
            }

            canvas.width = width;
            canvas.height = height;

            const ctx = canvas.getContext('2d');
            ctx.drawImage(img, 0, 0, width, height);

            // 以 0.7 的品質導出 JPEG (大幅縮減體積)
            const compressedBase64 = canvas.toDataURL('image/jpeg', 0.7);
            resolve(compressedBase64);
          };
        };
        reader.onerror = (error) => reject(error);
      });
    }

    async function submitPunch(action) {
      try {
        setLoading(true);
        setStatus('送出中，請稍候...');

        if (!profile) throw new Error('尚未取得 LINE 使用者資料');

        if (GAS_API_URL.includes('你的_GAS_部署ID')) {
          throw new Error('請先修改原始碼，填寫真正的 GAS_API_URL！');
        }

        const note = document.getElementById('note').value.trim();
        const photoInput = document.getElementById('photoInput');
        let imageData = null;

        if (photoInput.files && photoInput.files[0]) {
          // 改用壓縮功能，並等待完成
          imageData = await compressImage(photoInput.files[0], 1000);
        }

        const payload = {
          action,
          userId: profile.userId,
          displayName: profile.displayName,
          statusMessage: profile.statusMessage,
          pictureUrl: profile.pictureUrl,
          latitude: currentPosition.latitude || '',
          longitude: currentPosition.longitude || '',
          note: note,
          imageData: imageData // 新增圖片 Base64 資料
        };

        const response = await fetch(GAS_API_URL, {
          method: 'POST',
          redirect: 'follow', // 解決 GAS CORS 回傳重新導向的問題
          headers: {
            'Content-Type': 'text/plain;charset=utf-8', // GAS 必須使用 text/plain 以避開預檢請求 (Preflight)
          },
          body: JSON.stringify(payload)
        });

        const resData = await response.json();
        setLoading(false);

        if (resData.ok) {
          setStatus(resData.message || '打卡成功');
        } else {
          setStatus(resData.message || '打卡失敗');
        }
      } catch (err) {
        setLoading(false);
        setStatus('送出失敗：' + err.message);
      }
    }

    function setStatus(text) { document.getElementById('status').textContent = text; }
    function setLoading(loading) {
      document.getElementById('app').classList.toggle('loading', loading);
    }

    initApp();
  </script>
</body>

</html>
